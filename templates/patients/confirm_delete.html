{% extends 'base.html' %}
{% block title %}Delete Patient{% endblock %}
{% block page_title %}Delete Patient{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h5>Are you sure you want to delete {{ patient }}?</h5>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'patient_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
