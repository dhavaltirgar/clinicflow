{% extends 'base.html' %}
{% block title %}Cancel Appointment{% endblock %}
{% block page_title %}Cancel Appointment{% endblock %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h5>Cancel appointment for {{ appointment.patient }}?</h5>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Cancel</button>
      <a href="{% url 'appointment_list' %}" class="btn btn-secondary">Back</a>
    </form>
  </div>
</div>
{% endblock %}
